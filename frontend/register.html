<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | EliteShop</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="login-container">
        <div class="login-left">
            <div class="brand-pill">EliteShop</div>
            <h1>Create your premium account</h1>
            <p>Join thousands of shoppers enjoying curated products, fast delivery, and a smooth checkout experience.</p>
            <ul class="feature-list">
                <li><i class="fa-solid fa-bolt"></i> Fast checkout</li>
                <li><i class="fa-solid fa-shield-halved"></i> Secure payments</li>
                <li><i class="fa-solid fa-truck-fast"></i> Express delivery</li>
            </ul>
        </div>

        <div class="login-right">
            <form id="registerForm" class="auth-form">
                <h2>Create Account</h2>
                <p class="subtitle">Sign up and unlock exclusive offers.</p>

                <input type="text" id="username" placeholder="Full Name" required oninput="document.getElementById('name').value=this.value">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <input type="hidden" id="name" value="">

                <button type="submit">Create Account</button>

                <p id="message" class="form-message" aria-live="polite"></p>

                <p class="register-link">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        document.getElementById("registerForm")
        .addEventListener("submit", async function(e){

            e.preventDefault();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const response = await fetch(
                "http://localhost:3000/api/auth/register",
                {
                    method: "POST",
                    headers: {
                        "Content-Type":"application/json"
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        password
                    })
                }
            );

            const data = await response.json();

            document.getElementById("message")
            .innerText = data.message;
        });
    </script>
</body>
</html>
